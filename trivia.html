<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BYU Football Trivia – Hunter Clegg</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .game-wrap { max-width: 680px; margin: 3rem auto; padding: 0 2rem; }

    /* Score bar */
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
      border: 1px solid var(--gray-light);
      border-radius: 4px;
      padding: 0.85rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .score-cell { text-align: center; }
    .score-num {
      display: block;
      font-family: var(--font-head);
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--blue);
      line-height: 1;
    }
    .score-lbl {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 2px;
    }

    /* Progress */
    .progress-track {
      background: var(--gray-light);
      border-radius: 4px;
      height: 6px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Question card */
    .q-card {
      background: var(--white);
      border: 1px solid var(--gray-light);
      border-top: 4px solid var(--blue);
      border-radius: 4px;
      padding: 2rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 2px 12px rgba(0,46,93,0.07);
    }
    .q-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blue-light);
      margin-bottom: 0.75rem;
    }
    .q-text {
      font-family: var(--font-head);
      font-size: 1.25rem;
      color: var(--black);
      line-height: 1.4;
    }

    /* Answers */
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .ans-btn {
      background: var(--white);
      border: 2px solid var(--gray-light);
      border-radius: 4px;
      padding: 0.85rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--black);
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .ans-btn:hover:not(:disabled) {
      border-color: var(--blue);
      background: var(--off-white);
      transform: translateY(-1px);
    }
    .ans-btn.correct  { background: #d4edda; border-color: #28a745; color: #155724; }
    .ans-btn.wrong    { background: #f8d7da; border-color: #dc3545; color: #721c24; }
    .ans-btn:disabled { cursor: default; transform: none; }

    /* Feedback */
    .feedback {
      display: none;
      padding: 0.65rem 1rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 1rem;
    }
    .feedback.show       { display: block; }
    .feedback.correct-fb { background: #d4edda; color: #155724; }
    .feedback.wrong-fb   { background: #f8d7da; color: #721c24; }

    /* Fact */
    .fact-box {
      display: none;
      background: var(--off-white);
      border-left: 4px solid var(--blue);
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      color: var(--gray);
      border-radius: 0 4px 4px 0;
      margin-bottom: 1rem;
      line-height: 1.65;
    }
    .fact-box.show { display: block; }
    .fact-box strong { color: var(--blue); }

    /* Next btn */
    .next-btn {
      display: none;
      width: 100%;
      padding: 0.9rem;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn:hover { background: var(--blue-light); }
    .next-btn.show  { display: block; }

    /* Results */
    .results {
      display: none;
      text-align: center;
      background: var(--white);
      border: 1px solid var(--gray-light);
      border-top: 4px solid var(--blue);
      border-radius: 4px;
      padding: 3rem 2rem;
      box-shadow: 0 2px 12px rgba(0,46,93,0.07);
    }
    .results.show { display: block; }
    .results .big { font-family: var(--font-head); font-size: 5rem; font-weight: 900; color: var(--blue); line-height: 1; }
    .results .out { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em; color: var(--gray); text-transform: uppercase; margin: 0.25rem 0 1rem; }
    .results .grade { font-family: var(--font-head); font-size: 1.5rem; color: var(--black); margin-bottom: 0.5rem; }
    .results .desc  { color: var(--gray); font-size: 0.95rem; margin-bottom: 2rem; }
    .restart-btn {
      background: var(--blue);
      color: var(--white);
      border: none;
      padding: 0.8rem 2.5rem;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .restart-btn:hover { background: var(--blue-light); }

    @media (max-width: 480px) { .answers { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">Hunter Clegg</a>
    <button class="nav-toggle" aria-label="Toggle menu"
      onclick="this.nextElementSibling.classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="index.html">Home</a></li>

      <li><a href="tableau.html">Tableau</a></li>
      <li><a href="kvn.html">Kyle Van Noy</a></li>
      <li><a href="trivia.html" class="active">Trivia Game</a></li>
    </ul>
  </nav>

  <div class="page-banner">
    <div class="container">
      <p class="eyebrow">Web App</p>
      <h1>🏈 BYU Football Trivia</h1>
      <p>Think you know Cougar football? 15 questions. Prove it.</p>
    </div>
  </div>

  <div class="game-wrap">

    <div class="score-bar">
      <div class="score-cell">
        <span class="score-num" id="score-display">0</span>
        <span class="score-lbl">Score</span>
      </div>
      <div class="score-cell">
        <span class="score-num" id="q-display">1</span>
        <span class="score-lbl">Question</span>
      </div>
      <div class="score-cell">
        <span class="score-num">15</span>
        <span class="score-lbl">Total</span>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="q-card" id="q-card">
      <div class="q-num" id="q-num">Question 1 of 15</div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <div class="fact-box" id="fact-box"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>

    <div class="results" id="results">
      <div class="big" id="final-score"></div>
      <div class="out" id="final-out"></div>
      <div class="grade" id="final-grade"></div>
      <div class="desc" id="final-desc"></div>
      <button class="restart-btn" onclick="restart()">Play Again</button>
    </div>

  </div>

  <footer>
    <p>© 2026 Hunter Clegg &nbsp;·&nbsp; <a href="mailto:hclegg2@byu.edu">hclegg2@byu.edu</a></p>
  </footer>

  <script>
    const questions = [
      {
        q: "What year did BYU win its only national championship in football?",
        answers: ["1980", "1984", "1987", "1991"],
        correct: 1,
        fact: "BYU went 13-0 in 1984 under coach LaVell Edwards, defeating Michigan in the Holiday Bowl to clinch the national title."
      },
      {
        q: "Who coached BYU to their 1984 national championship?",
        answers: ["Gary Crowton", "Bronco Mendenhall", "LaVell Edwards", "Ty Detmer"],
        correct: 2,
        fact: "LaVell Edwards coached BYU from 1972 to 2000, finishing with a 257-101-3 record. The stadium in Provo was renamed in his honor."
      },
      {
        q: "Which BYU quarterback won the Heisman Trophy in 1990?",
        answers: ["Steve Young", "Jim McMahon", "Marc Wilson", "Ty Detmer"],
        correct: 3,
        fact: "Ty Detmer set the NCAA record with 5,188 passing yards in 1990 and won the Heisman in a landslide. He finished with 15,031 career passing yards at BYU."
      },
      {
        q: "What conference did BYU join in 2023?",
        answers: ["Pac-12", "Big Ten", "Big 12", "Mountain West"],
        correct: 2,
        fact: "BYU joined the Big 12 in 2023 after spending 12 years as a football independent following their departure from the Mountain West in 2011."
      },
      {
        q: "What is BYU's football stadium named?",
        answers: ["Cougar Stadium", "Provo Field", "LaVell Edwards Stadium", "Marriott Stadium"],
        correct: 2,
        fact: "LaVell Edwards Stadium seats approximately 63,000 fans and sits on BYU's campus in Provo, Utah."
      },
      {
        q: "Which BYU QB became an NFL Hall of Famer with the San Francisco 49ers?",
        answers: ["Ty Detmer", "Jim McMahon", "Steve Young", "Gifford Nielsen"],
        correct: 2,
        fact: "Steve Young was inducted into the Pro Football Hall of Fame in 2005. He won three Super Bowls with San Francisco and was a two-time NFL MVP."
      },
      {
        q: "What pick was Zach Wilson in the 2021 NFL Draft?",
        answers: ["1st overall", "2nd overall", "5th overall", "15th overall"],
        correct: 1,
        fact: "Zach Wilson was selected 2nd overall by the New York Jets in 2021, making him one of the highest-drafted players in BYU history."
      },
      {
        q: "What are BYU's official team colors?",
        answers: ["Navy and Gold", "Royal Blue and White", "Blue and Gold", "Midnight Blue and Silver"],
        correct: 1,
        fact: "BYU's official colors are Royal Blue and White. The distinctive shade is often called 'Cougar Blue.'"
      },
      {
        q: "What is BYU's rivalry game against the University of Utah called?",
        answers: ["The Border War", "The Holy War", "The Beehive Battle", "The Western Classic"],
        correct: 1,
        fact: "The BYU vs. Utah game is called the 'Holy War,' one of college football's most intense rivalries fueled by both athletic competition and cultural history."
      },
      {
        q: "Which BYU QB was selected 5th overall in the 1982 NFL Draft by the Chicago Bears?",
        answers: ["Steve Young", "Ty Detmer", "Jim McMahon", "Marc Wilson"],
        correct: 2,
        fact: "Jim McMahon was picked 5th overall by Chicago and led the Bears to a Super Bowl XX championship after the 1985 season."
      },
      {
        q: "What is BYU's team mascot called?",
        answers: ["Cougar Carl", "Cosmo", "Clawson", "Captain Cougar"],
        correct: 1,
        fact: "Cosmo the Cougar is one of the most recognizable mascots in college football and has been a fixture at BYU games for decades."
      },
      {
        q: "Kyle Van Noy, a BYU legend featured on this site, won how many Super Bowl rings in the NFL?",
        answers: ["0", "1", "2", "3"],
        correct: 2,
        fact: "Kyle Van Noy won Super Bowl rings with the New England Patriots after the 2016 and 2018 seasons, cementing his legacy as one of BYU's greatest NFL alumni."
      },
      {
        q: "What is the name of BYU's fight song?",
        answers: ["Hail to the Blue", "The Cougar Fight Song", "Rise and Shout", "Go Cougars Go"],
        correct: 2,
        fact: "\"Rise and Shout, the Cougars Are Out\" is BYU's official fight song and has energized fans at LaVell Edwards Stadium for generations."
      },
      {
        q: "BYU is owned and operated by which organization?",
        answers: ["The State of Utah", "The LDS Church", "A private endowment", "The Western Athletic Conference"],
        correct: 1,
        fact: "Brigham Young University is owned and operated by The Church of Jesus Christ of Latter-day Saints, which shapes its honor code, culture, and mission."
      },
      {
        q: "How many career passing yards did Ty Detmer throw for at BYU?",
        answers: ["9,231", "11,400", "13,500", "15,031"],
        correct: 3,
        fact: "Ty Detmer finished his BYU career with 15,031 passing yards — a program record that stands as a testament to one of college football's all-time great passers."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function load() {
      const q = questions[current];
      const total = questions.length;

      document.getElementById('q-num').textContent = `Question ${current + 1} of ${total}`;
      document.getElementById('q-text').textContent = q.q;
      document.getElementById('q-display').textContent = current + 1;
      document.getElementById('score-display').textContent = score;
      document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;

      const answersDiv = document.getElementById('answers');
      answersDiv.innerHTML = '';
      q.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.textContent = ans;
        btn.onclick = () => pick(i);
        answersDiv.appendChild(btn);
      });

      document.getElementById('feedback').className = 'feedback';
      document.getElementById('fact-box').className = 'fact-box';
      document.getElementById('next-btn').className = 'next-btn';
      answered = false;
    }

    function pick(index) {
      if (answered) return;
      answered = true;

      const q = questions[current];
      const btns = document.querySelectorAll('.ans-btn');
      const fb = document.getElementById('feedback');
      const fact = document.getElementById('fact-box');

      btns.forEach(b => b.disabled = true);
      btns[q.correct].classList.add('correct');

      if (index === q.correct) {
        score++;
        fb.textContent = '✅ Correct! Great Cougar knowledge!';
        fb.className = 'feedback correct-fb show';
      } else {
        btns[index].classList.add('wrong');
        fb.textContent = `❌ Not quite — the answer is "${q.answers[q.correct]}"`;
        fb.className = 'feedback wrong-fb show';
      }

      document.getElementById('score-display').textContent = score;
      fact.innerHTML = `<strong>📖 Did you know?</strong> ${q.fact}`;
      fact.className = 'fact-box show';
      document.getElementById('next-btn').className = 'next-btn show';
    }

    function nextQuestion() {
      current++;
      if (current >= questions.length) showResults();
      else load();
    }

    function showResults() {
      document.getElementById('q-card').style.display = 'none';
      document.getElementById('answers').style.display = 'none';
      document.getElementById('feedback').style.display = 'none';
      document.getElementById('fact-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('progress-fill').style.width = '100%';

      const total = questions.length;
      const pct = score / total;
      let grade, desc;
      if (pct === 1)       { grade = "Perfect Score! 🏆"; desc = "You're a true Cougar expert. LaVell would be proud."; }
      else if (pct >= 0.8) { grade = "Cougar Elite 🎖️"; desc = "Outstanding! You clearly bleed royal blue."; }
      else if (pct >= 0.6) { grade = "Solid Cougar Fan 👍"; desc = "Good knowledge! A little more study and you'll be an expert."; }
      else if (pct >= 0.4) { grade = "Keep Studying 📚"; desc = "Not bad, but there's more to learn about the Cougars."; }
      else                 { grade = "Freshman Year 🐾"; desc = "Everyone starts somewhere — watch some BYU highlights and try again!"; }

      document.getElementById('final-score').textContent = score;
      document.getElementById('final-out').textContent = `out of ${total}`;
      document.getElementById('final-grade').textContent = grade;
      document.getElementById('final-desc').textContent = desc;
      document.getElementById('results').className = 'results show';
    }

    function restart() {
      current = 0; score = 0;
      document.getElementById('q-card').style.display = '';
      document.getElementById('answers').style.display = '';
      document.getElementById('results').className = 'results';
      load();
    }

    load();
  </script>

</body>
</html>
